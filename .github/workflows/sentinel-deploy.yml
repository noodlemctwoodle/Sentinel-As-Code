# ---------------------------------------------------------------------------
# GitHub Actions Workflow: Deploy Microsoft Sentinel Infrastructure & Content
# ---------------------------------------------------------------------------
# Equivalent of Pipelines/Sentinel-Deploy.yml for GitHub-hosted repos.
#
# Prerequisites:
#   - Azure Service Principal with Contributor + Microsoft Sentinel Contributor
#   - Federated credentials (OIDC) configured for this repo
#   - CustomDetection.ReadWrite.All Graph permission for Stage 5
#
# Required secrets:
#   AZURE_CLIENT_ID        - Service Principal Application (client) ID
#   AZURE_TENANT_ID        - Entra ID Tenant ID
#   AZURE_SUBSCRIPTION_ID  - Azure Subscription ID
#
# Required variables (Settings > Secrets and variables > Variables):
#   SENTINEL_RESOURCE_GROUP   - Resource Group name
#   SENTINEL_WORKSPACE_NAME   - Log Analytics workspace name
#   SENTINEL_REGION           - Azure region (e.g., uksouth)
#   PLAYBOOK_RESOURCE_GROUP   - (Optional) Resource Group for playbooks, defaults to SENTINEL_RESOURCE_GROUP
#
# Authentication: Uses OIDC (federated credentials) by default.
# ---------------------------------------------------------------------------

name: Deploy Sentinel

on:
  workflow_dispatch:
    inputs:
      # ── Stage Toggles ────────────────────────────────────────────────
      deploy_infrastructure:
        description: "Stage 1-2: Deploy Infrastructure (Bicep)"
        type: boolean
        default: true
      deploy_content_hub:
        description: "Stage 3: Deploy Content Hub Solutions"
        type: boolean
        default: true
      deploy_custom_content:
        description: "Stage 4: Deploy Custom Content"
        type: boolean
        default: true
      deploy_defender_detections:
        description: "Stage 5: Deploy Defender XDR Custom Detections"
        type: boolean
        default: true

      # ── Infrastructure (Stage 2) ─────────────────────────────────────
      daily_quota:
        description: "Bicep: Daily Quota (GB, 0 = unlimited)"
        type: number
        default: 0
      retention_in_days:
        description: "Bicep: Interactive Retention (days, 30-730)"
        type: number
        default: 90
      total_retention_in_days:
        description: "Bicep: Total Retention incl. Archive (0 = same as interactive)"
        type: number
        default: 0

      # ── Content Hub (Stage 3) ────────────────────────────────────────
      solutions:
        description: "Content Hub: Solutions (comma-separated)"
        type: string
        default: "Analytics Health & Audit,Azure Activity,Azure DevOps Auditing,Azure Key Vault,Azure Logic Apps,Azure Network Security Groups,Azure Resource Graph,Azure Storage,Common Event Format,Data Collection Rule Toolkit,Microsoft 365,Microsoft Defender for Cloud,Microsoft Defender for Cloud Apps,Microsoft Defender for Endpoint,Microsoft Defender for Identity,Microsoft Defender Threat Intelligence,Microsoft Defender XDR,Microsoft Entra ID,Microsoft Sentinel Optimization Workbook,SOC Handbook,Summary Rules Workbook,Syslog,Threat Intelligence (NEW),Windows Security Events,Windows Server DNS,Workspace Usage Report"
      severities_to_include:
        description: "Content Hub: Analytics Rule Severities"
        type: string
        default: "High,Medium,Low,Informational"
      disable_rules:
        description: "Content Hub: Deploy Analytics Rules as Disabled"
        type: boolean
        default: true
      protect_customised_rules:
        description: "Content Hub: Protect Customised Rules"
        type: boolean
        default: true
      skip_analytics_rules:
        description: "Content Hub: Skip Analytics Rules"
        type: boolean
        default: false
      skip_workbooks:
        description: "Content Hub: Skip Workbooks"
        type: boolean
        default: false
      skip_automation_rules:
        description: "Content Hub: Skip Automation Rules"
        type: boolean
        default: false
      skip_hunting_queries:
        description: "Content Hub: Skip Hunting Queries"
        type: boolean
        default: false
      force_solution_update:
        description: "Content Hub: Force Solution Update (even if current)"
        type: boolean
        default: false
      force_content_deployment:
        description: "Content Hub: Force Content Redeployment (even if current)"
        type: boolean
        default: false

      # ── Custom Content (Stage 4) ─────────────────────────────────────
      # GitHub caps workflow_dispatch at 25 inputs. The ADO equivalent in
      # Pipelines/Sentinel-Deploy.yml exposes nine separate skipCustom*
      # boolean parameters here; we collapse them into one comma-separated
      # string so the GH workflow stays under the cap while preserving
      # identical downstream behaviour (Deploy-CustomContent.ps1 still
      # receives the individual -Skip* script parameters via the parsing
      # block in the deploy-custom-content job below).
      skip_custom_content_types:
        description: "Custom: Skip Content Types (comma-separated subset of: parsers, detections, community-detections, watchlists, playbooks, workbooks, hunting-queries, automation-rules, summary-rules)"
        type: string
        default: "community-detections"

      # ── General ──────────────────────────────────────────────────────
      smart_deployment:
        description: "Smart Deploy: only deploy changed/failed content"
        type: boolean
        default: true
      what_if:
        description: "Dry Run: preview changes without applying"
        type: boolean
        default: false

  schedule:
    - cron: "0 4 * * 1"  # Weekly Monday 04:00 UTC

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: ${{ vars.SENTINEL_RESOURCE_GROUP }}
  WORKSPACE_NAME: ${{ vars.SENTINEL_WORKSPACE_NAME }}
  REGION:         ${{ vars.SENTINEL_REGION }}

  # Pin powershell-yaml so a PSGallery release that tightens parser
  # behaviour cannot break a scheduled deploy. Bumping is a one-line PR
  # that re-runs the gate against the new version before merging.
  YAML_VERSION:   "0.4.12"

jobs:
  # ===========================================================================
  # Stage 1: Check Existing Infrastructure
  # ===========================================================================
  check-infrastructure:
    name: "Check Existing Infrastructure"
    runs-on: ubuntu-latest
    if: ${{ inputs.deploy_infrastructure != false }}
    outputs:
      resources_exist: ${{ steps.check.outputs.resources_exist }}
    steps:
      # Required even though this job reads no repo files: the
      # Azure-login composite below lives under .github/actions/ in
      # this repo, and local composite actions can only be resolved
      # once the runner has the repo on disk.
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: ./.github/actions/azure-login-oidc
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check for Existing Resources
        id: check
        uses: Azure/powershell@v2
        with:
          azPSVersion: "latest"
          inlineScript: |
            Write-Host "Checking for existing Sentinel infrastructure..."
            $resourcesExist = "false"

            $rg = Get-AzResourceGroup -Name "${{ env.RESOURCE_GROUP }}" -ErrorAction SilentlyContinue
            if ($rg) {
                $law = Get-AzOperationalInsightsWorkspace `
                    -ResourceGroupName "${{ env.RESOURCE_GROUP }}" `
                    -Name "${{ env.WORKSPACE_NAME }}" `
                    -ErrorAction SilentlyContinue
                if ($law) {
                    Write-Host "Workspace '${{ env.WORKSPACE_NAME }}' exists — skipping Bicep."
                    $resourcesExist = "true"
                } else {
                    Write-Host "Workspace not found — Bicep deployment required."
                }
            } else {
                Write-Host "Resource Group not found — full Bicep deployment required."
            }

            echo "resources_exist=$resourcesExist" >> $env:GITHUB_OUTPUT

  # ===========================================================================
  # Stage 2: Deploy Infrastructure (Bicep)
  # ===========================================================================
  deploy-infrastructure:
    name: "Deploy Sentinel Infrastructure (Bicep)"
    runs-on: ubuntu-latest
    needs: check-infrastructure
    if: |
      always() &&
      needs.check-infrastructure.result == 'success' &&
      needs.check-infrastructure.outputs.resources_exist == 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: ./.github/actions/azure-login-oidc
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Register Resource Providers
        uses: Azure/cli@v2
        with:
          inlineScript: |
            az provider register --namespace Microsoft.OperationsManagement --wait
            az provider register --namespace Microsoft.SecurityInsights --wait

      - name: Deploy Bicep Templates
        uses: Azure/cli@v2
        with:
          inlineScript: |
            az deployment sub create \
              --location "${{ env.REGION }}" \
              --template-file Bicep/main.bicep \
              --parameters \
                rgLocation="${{ env.REGION }}" \
                rgName="${{ env.RESOURCE_GROUP }}" \
                lawName="${{ env.WORKSPACE_NAME }}" \
                dailyQuota=${{ inputs.daily_quota || 0 }} \
                retentionInDays=${{ inputs.retention_in_days || 90 }} \
                totalRetentionInDays=${{ inputs.total_retention_in_days || 0 }}

      - name: Wait for Workspace Indexing
        shell: pwsh
        run: |
          Write-Host "Waiting 60 seconds for Log Analytics workspace to become queryable..."
          Start-Sleep -Seconds 60
          Write-Host "Done."

      - name: Configure Sentinel Settings
        uses: Azure/powershell@v2
        with:
          azPSVersion: "latest"
          inlineScript: |
            $token = (Get-AzAccessToken -ResourceUrl "https://management.azure.com" -WarningAction SilentlyContinue)
            if ($token.Token -is [System.Security.SecureString]) {
                $accessToken = $token.Token | ConvertFrom-SecureString -AsPlainText
            } else {
                $accessToken = $token.Token
            }
            $headers = @{
                Authorization  = "Bearer $accessToken"
                'Content-Type' = 'application/json'
            }
            $baseUri = "https://management.azure.com/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.OperationalInsights/workspaces/${{ env.WORKSPACE_NAME }}"
            $api = "api-version=2024-01-01-preview"

            $settings = @(
                @{ name = 'Anomalies';       body = @{ kind = 'Anomalies';       etag = $null; properties = @{} } }
                @{ name = 'EyesOn';          body = @{ kind = 'EyesOn';          etag = $null; properties = @{} } }
                @{ name = 'EntityAnalytics'; body = @{ kind = 'EntityAnalytics'; etag = $null; properties = @{ entityProviders = @('AzureActiveDirectory') } } }
                @{ name = 'Ueba';            body = @{ kind = 'Ueba';            etag = $null; properties = @{ dataSources = @('AuditLogs','AzureActivity','SigninLogs','SecurityEvent') } } }
            )

            foreach ($s in $settings) {
                $uri = "$baseUri/providers/Microsoft.SecurityInsights/settings/$($s.name)?$api"
                # GET current setting to retrieve etag
                try {
                    $getHeaders = @{ Authorization = "Bearer $accessToken" }
                    $current = Invoke-RestMethod -Uri $uri -Method Get -Headers $getHeaders
                    if ($current.etag) { $s.body['etag'] = $current.etag }
                } catch {}

                $json = $s.body | ConvertTo-Json -Depth 5

                $putHeaders = @{
                    Authorization  = "Bearer $accessToken"
                    'Content-Type' = 'application/json'
                    'If-Match'     = if ($s.body.etag) { $s.body.etag } else { '*' }
                }

                try {
                    Invoke-RestMethod -Uri $uri -Method Put -Headers $putHeaders -Body $json | Out-Null
                    Write-Host "Configured: $($s.name)"
                }
                catch {
                    $errorBody = $null
                    if ($_.Exception.Response) {
                        try {
                            $stream = $_.Exception.Response.GetResponseStream()
                            $reader = [System.IO.StreamReader]::new($stream)
                            $errorBody = $reader.ReadToEnd()
                            $reader.Close()
                        } catch {}
                    }
                    if ($errorBody) {
                        Write-Warning "Failed to configure $($s.name): $($_.Exception.Message) — $errorBody"
                    } else {
                        Write-Warning "Failed to configure $($s.name): $($_.Exception.Message)"
                    }
                }
            }

  # ===========================================================================
  # Stage 3: Deploy Content Hub
  # ===========================================================================
  deploy-content-hub:
    name: "Deploy Sentinel Content Hub"
    runs-on: ubuntu-latest
    needs: [check-infrastructure, deploy-infrastructure]
    if: |
      always() &&
      (inputs.deploy_content_hub != false) &&
      (needs.deploy-infrastructure.result == 'success' || needs.deploy-infrastructure.result == 'skipped')
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: ./.github/actions/azure-login-oidc
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Content Hub Solutions
        uses: Azure/powershell@v2
        with:
          azPSVersion: "latest"
          inlineScript: |
            $solutionList = "${{ inputs.solutions || 'Analytics Health & Audit,Azure Activity,Azure DevOps Auditing,Azure Key Vault,Azure Logic Apps,Azure Network Security Groups,Azure Resource Graph,Azure Storage,Common Event Format,Data Collection Rule Toolkit,Microsoft 365,Microsoft Defender for Cloud,Microsoft Defender for Cloud Apps,Microsoft Defender for Endpoint,Microsoft Defender for Identity,Microsoft Defender Threat Intelligence,Microsoft Defender XDR,Microsoft Entra ID,Microsoft Sentinel Optimization Workbook,SOC Handbook,Summary Rules Workbook,Syslog,Threat Intelligence (NEW),Windows Security Events,Windows Server DNS,Workspace Usage Report' }}" -split ',' | ForEach-Object { $_.Trim() }
            $severityList = "${{ inputs.severities_to_include || 'High,Medium,Low,Informational' }}" -split ',' | ForEach-Object { $_.Trim() }

            $scriptParams = @{
                SubscriptionId      = "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
                ResourceGroup       = "${{ env.RESOURCE_GROUP }}"
                Workspace           = "${{ env.WORKSPACE_NAME }}"
                Region              = "${{ env.REGION }}"
                Solutions           = $solutionList
                SeveritiesToInclude = $severityList
            }

            if ("${{ inputs.disable_rules }}" -ne "false")             { $scriptParams['DisableRules']             = $true }
            if ("${{ inputs.protect_customised_rules }}" -ne "false")  { $scriptParams['ProtectCustomisedRules']   = $true }
            if ("${{ inputs.skip_analytics_rules }}" -eq "true")       { $scriptParams['SkipAnalyticsRules']       = $true }
            if ("${{ inputs.skip_workbooks }}" -eq "true")             { $scriptParams['SkipWorkbooks']            = $true }
            if ("${{ inputs.skip_automation_rules }}" -eq "true")      { $scriptParams['SkipAutomationRules']      = $true }
            if ("${{ inputs.skip_hunting_queries }}" -eq "true")       { $scriptParams['SkipHuntingQueries']       = $true }
            if ("${{ inputs.force_solution_update }}" -eq "true")      { $scriptParams['ForceSolutionUpdate']      = $true }
            if ("${{ inputs.force_content_deployment }}" -eq "true")   { $scriptParams['ForceContentDeployment']   = $true }
            if ("${{ inputs.what_if }}" -eq "true")                    { $scriptParams['WhatIf']                   = $true }

            & "${{ github.workspace }}/Scripts/Deploy-SentinelContentHub.ps1" @scriptParams

  # ===========================================================================
  # Stage 4: Deploy Custom Content
  # ===========================================================================
  deploy-custom-content:
    name: "Deploy Custom Content"
    runs-on: ubuntu-latest
    needs: [check-infrastructure, deploy-infrastructure, deploy-content-hub]
    if: |
      always() &&
      (inputs.deploy_custom_content != false) &&
      (needs.deploy-content-hub.result == 'success' || needs.deploy-content-hub.result == 'skipped')
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # Smart deployment needs parent commit for git diff

      - name: Restore Deployment State
        uses: actions/cache/restore@v4
        continue-on-error: true
        with:
          path: ${{ github.workspace }}/.deployment-state.json
          key: deployment-state-${{ env.WORKSPACE_NAME }}-
          restore-keys: |
            deployment-state-${{ env.WORKSPACE_NAME }}-

      - name: Set up PowerShell modules (powershell-yaml only)
        uses: ./.github/actions/setup-pwsh-modules
        with:
          yaml-version:   ${{ env.YAML_VERSION }}
          install-pester: 'false'

      # Pre-deploy guard: dependencies.json must match what discovery
      # produces from current content. The PR-validation gate already
      # checks this on every PR to main, but a scheduled deploy from main
      # could still race if a non-deploy commit (e.g. a doc-only change
      # that bumps an analytical rule's query inline) bypassed the gate.
      # Failing fast here is cheap and prevents the deployer from running
      # against a stale dependency graph.
      - name: Verify dependency manifest is current
        shell: pwsh
        run: |
          & "${{ github.workspace }}/Scripts/Build-DependencyManifest.ps1" -Mode Verify -RepoPath "${{ github.workspace }}"
          if ($LASTEXITCODE -ne 0) {
              Write-Host "##[error]dependencies.json is out of sync. Refusing to deploy with a stale dependency graph."
              Write-Host "##[error]Fix: run ./Scripts/Build-DependencyManifest.ps1 -Mode Generate, commit, then re-run this workflow."
              exit 1
          }

      - name: Azure Login (OIDC)
        uses: ./.github/actions/azure-login-oidc
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Custom Content
        uses: Azure/powershell@v2
        with:
          azPSVersion: "latest"
          inlineScript: |
            $scriptParams = @{
                SubscriptionId = "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
                ResourceGroup  = "${{ env.RESOURCE_GROUP }}"
                Workspace      = "${{ env.WORKSPACE_NAME }}"
                Region         = "${{ env.REGION }}"
                BasePath       = "${{ github.workspace }}"
            }

            $playbookRG = "${{ vars.PLAYBOOK_RESOURCE_GROUP }}"
            if ($playbookRG) { $scriptParams['PlaybookResourceGroup'] = $playbookRG }

            # Parse the consolidated skip_custom_content_types string
            # into individual -Skip* script parameters. The cron trigger
            # has no inputs.*, so the `|| 'community-detections'` fallback
            # matches the workflow_dispatch default for parity. ADO's
            # equivalent block (Pipelines/Sentinel-Deploy.yml) sets the
            # same -Skip* parameters from its nine individual boolean
            # parameters — net effect on Deploy-CustomContent.ps1 is
            # identical across both platforms.
            $skipList = "${{ inputs.skip_custom_content_types || 'community-detections' }}" -split ',' |
                ForEach-Object { $_.Trim().ToLower() } |
                Where-Object { $_ }

            if ($skipList -contains 'parsers')              { $scriptParams['SkipParsers']              = $true }
            if ($skipList -contains 'detections')           { $scriptParams['SkipDetections']           = $true }
            if ($skipList -contains 'community-detections') { $scriptParams['SkipCommunityDetections'] = $true }
            if ($skipList -contains 'watchlists')           { $scriptParams['SkipWatchlists']           = $true }
            if ($skipList -contains 'playbooks')            { $scriptParams['SkipPlaybooks']            = $true }
            if ($skipList -contains 'workbooks')            { $scriptParams['SkipWorkbooks']            = $true }
            if ($skipList -contains 'hunting-queries')      { $scriptParams['SkipHuntingQueries']       = $true }
            if ($skipList -contains 'automation-rules')     { $scriptParams['SkipAutomationRules']      = $true }
            if ($skipList -contains 'summary-rules')        { $scriptParams['SkipSummaryRules']         = $true }
            if ("${{ inputs.smart_deployment }}" -ne "false")            { $scriptParams['SmartDeployment']    = $true }
            if ("${{ inputs.what_if }}" -eq "true")                      { $scriptParams['WhatIf']             = $true }

            & "${{ github.workspace }}/Scripts/Deploy-CustomContent.ps1" @scriptParams

      - name: Save Deployment State
        if: always()
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/.deployment-state.json
          key: deployment-state-${{ env.WORKSPACE_NAME }}-${{ github.run_id }}

  # ===========================================================================
  # Stage 5: Deploy Defender XDR Custom Detections
  # ===========================================================================
  deploy-defender-detections:
    name: "Deploy Defender XDR Custom Detections"
    runs-on: ubuntu-latest
    needs: [check-infrastructure, deploy-infrastructure, deploy-content-hub, deploy-custom-content]
    if: |
      always() &&
      (inputs.deploy_defender_detections != false) &&
      (needs.deploy-custom-content.result == 'success' || needs.deploy-custom-content.result == 'skipped')
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: ./.github/actions/azure-login-oidc
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up PowerShell modules (powershell-yaml only)
        uses: ./.github/actions/setup-pwsh-modules
        with:
          yaml-version:   ${{ env.YAML_VERSION }}
          install-pester: 'false'

      - name: Deploy Defender Custom Detections
        uses: Azure/powershell@v2
        with:
          azPSVersion: "latest"
          inlineScript: |
            $scriptParams = @{
                BasePath = "${{ github.workspace }}"
            }

            if ("${{ inputs.what_if }}" -eq "true") { $scriptParams['WhatIf'] = $true }

            & "${{ github.workspace }}/Scripts/Deploy-DefenderDetections.ps1" @scriptParams
